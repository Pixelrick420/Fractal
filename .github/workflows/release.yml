name: Build and Release Fractal
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-release:
    name: Build Fractal Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-musl-
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev

      - name: Build fractal-compiler (fully static)
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          RUSTFLAGS: "-C target-feature=+crt-static"
          PKG_CONFIG_ALL_STATIC: "1"
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            --bin fractal-compiler

      - name: Verify fractal-compiler is fully static
        run: |
          bin=target/x86_64-unknown-linux-musl/release/fractal-compiler
          echo "=== fractal-compiler ==="
          file "$bin"
          ldd "$bin" 2>&1 || true



          ldd_out=$(ldd "$bin" 2>&1 || true)
          if echo "$ldd_out" | grep -qE 'statically linked|not a dynamic executable'; then
            echo "OK: fractal-compiler is fully static"
          else
            echo "ERROR: fractal-compiler is not fully static"
            echo "$ldd_out"
            exit 1
          fi

      - name: Build fractal-editor (musl, opengl runtime)
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc

          RUSTFLAGS: ""
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            --bin fractal-editor

      - name: Verify fractal-editor dependencies are minimal
        run: |
          bin=target/x86_64-unknown-linux-musl/release/fractal-editor
          echo "=== fractal-editor ==="
          file "$bin"
          echo "--- dynamic deps (only GL/EGL/X11/wayland expected) ---"
          ldd "$bin" 2>&1 || true

          if objdump -p "$bin" 2>/dev/null | grep -q 'GLIBC_2\.[0-9]'; then
            echo "ERROR: fractal-editor has versioned GLIBC deps - musl build failed"
            exit 1
          fi
          echo "OK: fractal-editor has no versioned GLIBC dependencies"

      - name: Prepare executables folder
        run: |
          mkdir -p executable


          echo '--- build output ---'
          ls -lh target/x86_64-unknown-linux-musl/release/fractal-* 2>&1 || true
          echo '--- repo root ---'
          ls -lh . 2>&1 || true

          cp target/x86_64-unknown-linux-musl/release/fractal-compiler executable/fractal-compiler
          cp target/x86_64-unknown-linux-musl/release/fractal-editor   executable/fractal-editor
          chmod +x executable/fractal-compiler executable/fractal-editor


          for script in install.sh uninstall.sh; do
            found=$(find . -maxdepth 2 -name "$script" \
              -not -path './target/*' -not -path './executable/*' | head -1)
            if [[ -n "$found" ]]; then
              cp "$found" "executable/$script"
              echo "Copied $found -> executable/$script"
            else
              echo "Warning: $script not found in repo - skipping"
            fi
          done

          echo '--- executable/ ---'
          ls -lh executable/

      - name: Compute version tag
        id: version
        run: |
          SHORT=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "tag=v${DATE}-${SHORT}" >> $GITHUB_OUTPUT
          echo "short=${SHORT}"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Fractal ${{ steps.version.outputs.tag }}"
          body: |
            #
            Built from commit `${{ steps.version.outputs.short }}` on branch `${{ github.ref_name }}`.

            Both binaries use musl - no GLIBC version requirement.

            | Binary | Runtime dependencies |
            |--------|---------------------|
            | `fractal-compiler` | None - fully static, runs on any x86-64 Linux |
            | `fractal-editor`   | `libGL`/`libEGL` + X11 or Wayland (present on any desktop Linux) |

            ##
            ```bash
            curl -fsSL https://github.com/Pixelrick420/Fractal/releases/latest/download/install.sh | bash
            ```

            ##
            ```bash
            fractal-compiler your_program.fr
            fractal-compiler debug your_program.fr
            fractal-editor
            ```
          files: |
            executable/fractal-compiler
            executable/fractal-editor
            executable/install.sh
            executable/uninstall.sh
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
